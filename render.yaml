services:
  - type: web
    name: campus-assist-pro
    env: python
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://campus-assist-pro.onrender.com

databases:
  - name: campus-db
    databaseName: campus_assist_pro
    plan: free